name: Build signed APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore
        if: github.event_name != 'pull_request'
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_SIGNING_KEYSTORE_BASE64" ]; then
            echo "ANDROID_SIGNING_KEYSTORE_BASE64 secret is required for signed release builds." >&2
            exit 1
          fi
          echo "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK for pull requests
        if: github.event_name == 'pull_request'
        run: ./gradlew --no-daemon assembleDebug

      - name: Build signed release APK
        if: github.event_name != 'pull_request'
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for name in STORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "$name secret is required for signed release builds." >&2
              exit 1
            fi
          done
          ./gradlew --no-daemon assembleRelease \
            -PSTORE_FILE=release.keystore \
            -PSTORE_PASSWORD="$STORE_PASSWORD" \
            -PKEY_ALIAS="$KEY_ALIAS" \
            -PKEY_PASSWORD="$KEY_PASSWORD"

      - name: Upload debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload signed release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
